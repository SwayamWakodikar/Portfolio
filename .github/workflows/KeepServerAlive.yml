name: Keep Server Alive

on:
  schedule:
    - cron: "0 */6 * * *"   # Every 6 hours
  workflow_dispatch:        # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Send request to server
        run: |
          curl -fsS https://portfolio-quw1.onrender.com || exit 1
